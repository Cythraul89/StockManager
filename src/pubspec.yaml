name: stock_manager
description: Cross-platform personal stock portfolio tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # HTTP client
  dio: ^5.4.3+1

  # Secure storage (Nextcloud credentials + cert fingerprints)
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1

  # Background tasks (Android only — WorkManager)
  workmanager: ^0.6.0

  # Financial arithmetic — never double for money
  decimal: ^3.0.2

  # Utilities
  uuid: ^4.4.0
  xml: ^6.5.0
  archive: ^3.6.1
  crypto: ^3.0.3
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
