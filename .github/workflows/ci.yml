name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: src

jobs:
  # ── Analyse & test (runs first, gates all build jobs) ──────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  # ── Android ────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Enable core library desugaring (flutter_local_notifications)
        shell: python3 {0}
        run: |
          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()
          content = content.replace(
              'compileOptions {',
              'compileOptions {\n        coreLibraryDesugaringEnabled true',
              1,
          )
          dep = '    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"'
          if 'dependencies {}' in content:
              content = content.replace('dependencies {}', 'dependencies {\n' + dep + '\n}', 1)
          else:
              content = content.replace('dependencies {', 'dependencies {\n' + dep, 1)
          with open(path, 'w') as f:
              f.write(content)

      - name: Build APK (debug — unsigned)
        run: flutter build apk --debug

  # ── Linux ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Linux platform files
        run: flutter create --platforms=linux .

      - name: Build Linux
        run: flutter build linux --release

  # ── Windows ────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - name: Build Windows
        run: flutter build windows --release

  # ── macOS ────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate macOS platform files
        run: flutter create --platforms=macos .

      - name: Build macOS
        run: flutter build macos --release
