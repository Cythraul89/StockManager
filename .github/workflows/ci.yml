name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for all JavaScript actions before the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: src

jobs:
  # ── Analyse & test (runs first, gates all build jobs) ──────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  # ── Android ────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Patch AndroidManifest permissions
        shell: python3 {0}
        run: |
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest_path) as f:
              content = f.read()

          # Add tools namespace (required for tools:node merge directives below).
          if 'xmlns:tools' not in content:
              content = content.replace(
                  'xmlns:android="http://schemas.android.com/apk/res/android"',
                  'xmlns:android="http://schemas.android.com/apk/res/android"\n    xmlns:tools="http://schemas.android.com/tools"',
                  1,
              )
              print('Added xmlns:tools namespace')

          for perm in [
              'android.permission.INTERNET',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.VIBRATE',
              'android.permission.RECEIVE_BOOT_COMPLETED',
          ]:
              if perm not in content:
                  content = content.replace(
                      '    <application',
                      f'    <uses-permission android:name="{perm}"/>\n    <application',
                      1,
                  )
                  print(f'Added permission: {perm}')

          # Disable WorkManager's automatic ContentProvider initialization.
          # WorkManagerInitializer runs before the Dart VM starts and can crash
          # on some devices. We call Workmanager().initialize() manually from
          # Dart (main.dart) instead — the documented alternative approach.
          if 'WorkManagerInitializer' not in content:
              wm_block = (
                  '\n'
                  '        <provider\n'
                  '            android:name="androidx.startup.InitializationProvider"\n'
                  '            android:authorities="${applicationId}.androidx-startup"\n'
                  '            android:exported="false"\n'
                  '            tools:node="merge">\n'
                  '            <meta-data\n'
                  '                android:name="androidx.work.WorkManagerInitializer"\n'
                  '                android:value="androidx.startup"\n'
                  '                tools:node="remove" />\n'
                  '        </provider>'
              )
              content = content.replace(
                  '    </application>',
                  wm_block + '\n    </application>',
                  1,
              )
              print('Disabled WorkManager auto-init ContentProvider')

          with open(manifest_path, 'w') as f:
              f.write(content)

          # Sanity-check: print the final manifest so CI logs show exactly
          # what permissions and providers are present in the APK.
          print('\n=== Final AndroidManifest.xml ===')
          print(content)
          print('=== End AndroidManifest.xml ===\n')

      # Release signing setup.
      #
      # One-time setup (run locally, then add secrets to the repo):
      #   keytool -genkey -v \
      #     -keystore release.keystore \
      #     -alias upload -keyalg RSA -keysize 2048 -validity 10000
      #   base64 -w 0 release.keystore   # Linux
      #   base64 -i release.keystore     # macOS
      #
      # Add these four repository secrets (Settings → Secrets → Actions):
      #   ANDROID_RELEASE_KEYSTORE_B64  — base64 output from above
      #   ANDROID_KEYSTORE_PASSWORD     — storepass you chose
      #   ANDROID_KEY_ALIAS             — alias you chose (e.g. "upload")
      #   ANDROID_KEY_PASSWORD          — keypass you chose
      - name: Write release keystore and key.properties
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/release.keystore
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../release.keystore
          EOF

      - name: Enable core library desugaring (flutter_local_notifications)
        shell: python3 {0}
        run: |
          path = 'android/app/build.gradle.kts'
          with open(path) as f:
              content = f.read()
          # flutter_plugin_android_lifecycle requires compileSdk >= 36
          content = content.replace(
              'compileSdk = flutter.compileSdkVersion',
              'compileSdk = 36',
              1,
          )
          content = content.replace(
              'compileOptions {',
              'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
              1,
          )
          dep = '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if 'dependencies {}' in content:
              content = content.replace('dependencies {}', 'dependencies {\n' + dep + '\n}', 1)
          elif 'dependencies {' in content:
              content = content.replace('dependencies {', 'dependencies {\n' + dep, 1)
          else:
              content = content.rstrip() + '\n\ndependencies {\n' + dep + '\n}\n'
          with open(path, 'w') as f:
              f.write(content)
          # file_picker hardcodes compileSdkVersion=34 in its own build file.
          # AGP 9+ dropped the compileSdkVersion method from the new DSL — it only
          # reads compileSdk. Rename it and ensure the value is >= 36.
          # Patch both Groovy (.gradle) and Kotlin DSL (.gradle.kts) variants.
          import glob, os, re
          pub_cache = os.environ.get('PUB_CACHE', os.path.expanduser('~/.pub-cache'))
          pattern = os.path.join(
              pub_cache, 'hosted', 'pub.dev',
              'file_picker-*', 'android', 'build.gradle*',
          )
          matched = glob.glob(pattern)
          print(f'file_picker build files found: {matched}')
          for fp in matched:
              with open(fp) as f:
                  txt = f.read()
              # compileSdkVersion N → compileSdk N (rename + bump)
              updated = re.sub(
                  r'compileSdkVersion\s+(\d+)',
                  lambda m: 'compileSdk ' + str(max(int(m.group(1)), 36)),
                  txt,
              )
              # compileSdk = N (Kotlin DSL) — bump if below 36
              updated = re.sub(
                  r'(compileSdk\s*=\s*)(\d+)',
                  lambda m: m.group(1) + str(max(int(m.group(2)), 36)),
                  updated,
              )
              # compileSdk N (Groovy DSL, no =) — bump if below 36
              updated = re.sub(
                  r'(compileSdk\s+)(\d+)',
                  lambda m: m.group(1) + str(max(int(m.group(2)), 36)),
                  updated,
              )
              if updated != txt:
                  with open(fp, 'w') as f:
                      f.write(updated)
                  print(f'Patched: {fp}')
              else:
                  print(f'No upgrade needed in: {fp}')
          if not matched:
              print('WARNING: No file_picker build files found in pub cache')

          # Inject release signing config when key.properties exists.
          kp = 'android/key.properties'
          if os.path.exists(kp):
              app_gradle = 'android/app/build.gradle.kts'
              with open(app_gradle) as f:
                  gradle = f.read()
              nl = '\n'
              signing_block = (
                  'import java.util.Properties' + nl +
                  'import java.io.FileInputStream' + nl + nl +
                  'val keystoreProps = Properties().apply {' + nl +
                  '    val f = rootProject.file("key.properties")' + nl +
                  '    if (f.exists()) load(FileInputStream(f))' + nl +
                  '}' + nl + nl
              )
              signing_config = (
                  nl +
                  '    signingConfigs {' + nl +
                  '        create("release") {' + nl +
                  '            keyAlias      = keystoreProps["keyAlias"]      as String' + nl +
                  '            keyPassword   = keystoreProps["keyPassword"]   as String' + nl +
                  '            storeFile     = file(keystoreProps["storeFile"] as String)' + nl +
                  '            storePassword = keystoreProps["storePassword"] as String' + nl +
                  '        }' + nl +
                  '    }' + nl
              )
              gradle = signing_block + gradle
              gradle = gradle.replace('    buildTypes {', signing_config + '    buildTypes {', 1)
              gradle = gradle.replace(
                  'signingConfig = signingConfigs.getByName("debug")',
                  'signingConfig = signingConfigs.getByName("release")',
                  1,
              )
              with open(app_gradle, 'w') as f:
                  f.write(gradle)
              print('Injected release signing config into build.gradle.kts')

      - name: Build APK
        run: |
          if [ -f android/key.properties ]; then
            flutter build apk --release --build-number=${{ github.run_number }}
          else
            flutter build apk --debug --build-number=${{ github.run_number }}
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            src/build/app/outputs/flutter-apk/app-release.apk
            src/build/app/outputs/flutter-apk/app-debug.apk

  # ── Linux ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Linux platform files
        run: flutter create --platforms=linux .

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: src/build/linux/x64/release/bundle/

  # ── Windows ────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: src/build/windows/x64/runner/Release/

  # ── macOS ────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate macOS platform files
        run: flutter create --platforms=macos .

      - name: Build macOS
        run: flutter build macos --release

      - name: Re-sign macOS app (ad-hoc, no sandbox)
        working-directory: src/build/macos/Build/Products/Release
        run: |
          cat > /tmp/nosandbox.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - \
            --entitlements /tmp/nosandbox.entitlements \
            stock_manager.app

      - name: Package macOS app into zip
        working-directory: src/build/macos/Build/Products/Release
        run: |
          # ditto preserves .app symlinks and resource forks; --keepParent
          # ensures the zip root is stock_manager.app itself so double-clicking
          # the zip in Finder extracts the .app directly without nested folders.
          ditto -c -k --sequesterRsrc --keepParent \
            stock_manager.app StockManager.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src/build/macos/Build/Products/Release/StockManager.zip
