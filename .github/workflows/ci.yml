name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: src

jobs:
  # ── Analyse & test (runs first, gates all build jobs) ──────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

  # ── Android ────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      # Restore a persistent debug keystore so every build is signed with
      # the same key — required for sideloaded APK updates to be accepted
      # by Android without uninstalling first.
      #
      # One-time setup (run locally, then add secret to the repo):
      #   keytool -genkey -v \
      #     -keystore debug.keystore \
      #     -storepass android -alias androiddebugkey -keypass android \
      #     -keyalg RSA -keysize 2048 -validity 10000 \
      #     -dname "CN=Android Debug,O=Android,C=US"
      #   base64 -w 0 debug.keystore   # Linux
      #   base64 -i debug.keystore     # macOS
      # Copy the output and add it as repository secret
      # ANDROID_DEBUG_KEYSTORE_B64 (Settings → Secrets → Actions).
      - name: Restore debug keystore
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}
        run: |
          mkdir -p ~/.android
          echo "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore

      - name: Enable core library desugaring (flutter_local_notifications)
        shell: python3 {0}
        run: |
          path = 'android/app/build.gradle.kts'
          with open(path) as f:
              content = f.read()
          # flutter_plugin_android_lifecycle requires compileSdk >= 36
          content = content.replace(
              'compileSdk = flutter.compileSdkVersion',
              'compileSdk = 36',
              1,
          )
          content = content.replace(
              'compileOptions {',
              'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
              1,
          )
          dep = '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if 'dependencies {}' in content:
              content = content.replace('dependencies {}', 'dependencies {\n' + dep + '\n}', 1)
          elif 'dependencies {' in content:
              content = content.replace('dependencies {', 'dependencies {\n' + dep, 1)
          else:
              content = content.rstrip() + '\n\ndependencies {\n' + dep + '\n}\n'
          with open(path, 'w') as f:
              f.write(content)

      - name: Build APK (debug — unsigned)
        run: flutter build apk --debug --build-number=${{ github.run_number }}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src/build/app/outputs/flutter-apk/app-debug.apk

  # ── Linux ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libsecret-1-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Linux platform files
        run: flutter create --platforms=linux .

      - name: Build Linux
        run: flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: src/build/linux/x64/release/bundle/

  # ── Windows ────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: src/build/windows/x64/runner/Release/

  # ── macOS ────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build

      - name: Generate macOS platform files
        run: flutter create --platforms=macos .

      - name: Build macOS
        run: flutter build macos --release

      - name: Re-sign macOS app (ad-hoc, no sandbox)
        working-directory: src/build/macos/Build/Products/Release
        run: |
          cat > /tmp/nosandbox.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - \
            --entitlements /tmp/nosandbox.entitlements \
            stock_manager.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: src/build/macos/Build/Products/Release/stock_manager.app
