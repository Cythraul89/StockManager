name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # e.g. v1.0.0

# Required so the workflow can create a GitHub Release and upload assets
permissions:
  contents: write

defaults:
  run:
    working-directory: src

jobs:
  # ── Android (signed AAB) ───────────────────────────────────────────────
  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the base64-encoded keystore stored as a secret
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build signed AAB
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=KEY_ALIAS=$ANDROID_KEY_ALIAS \
            --dart-define=KEY_PASSWORD=$ANDROID_KEY_PASSWORD \
            --dart-define=STORE_PASSWORD=$ANDROID_STORE_PASSWORD

      - name: Upload AAB to release
        uses: softprops/action-gh-release@v2
        with:
          files: src/build/app/outputs/bundle/release/app-release.aab

  # ── Linux ─────────────────────────────────────────────────────
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release
          zip -r ../../../../stockmanager-linux-x64.zip bundle/

      - name: Upload Linux archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: src/stockmanager-linux-x64.zip

  # ── Windows ──────────────────────────────────────────────────
  release-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows bundle
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath stockmanager-windows-x64.zip

      - name: Upload Windows archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: src/stockmanager-windows-x64.zip

  # ── macOS ──────────────────────────────────────────────────
  # Note: distributing outside the Mac App Store requires a Developer ID
  # certificate added as secrets (MACOS_CERTIFICATE + MACOS_CERTIFICATE_PWD).
  # Without it the .app runs on the build machine but is unsigned for end users.
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Optional: import Developer ID certificate for signed distribution
      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../stockmanager-macos.zip StockManager.app

      - name: Upload macOS archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: src/stockmanager-macos.zip
