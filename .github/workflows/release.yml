name: Flutter Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Required so the final job can create a GitHub Release and upload assets.
permissions:
  contents: write

# Opt into Node.js 24 for all JavaScript actions before the June 2026 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: src

jobs:
  # ── Android (signed APK) ──────────────────────────────────────────────────────
  build-android:
    name: Release Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Patch AndroidManifest permissions
        shell: python3 {0}
        run: |
          manifest_path = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest_path) as f:
              content = f.read()
          for perm in [
              'android.permission.INTERNET',
              'android.permission.POST_NOTIFICATIONS',
              'android.permission.VIBRATE',
              'android.permission.RECEIVE_BOOT_COMPLETED',
          ]:
              if perm not in content:
                  content = content.replace(
                      '    <application',
                      f'    <uses-permission android:name="{perm}"/>\n    <application',
                      1,
                  )
                  print(f'Added permission: {perm}')
          with open(manifest_path, 'w') as f:
              f.write(content)

      # Release signing setup — same secret names as ci.yml:
      #   ANDROID_RELEASE_KEYSTORE_B64  — base64-encoded .jks / .keystore
      #   ANDROID_KEYSTORE_PASSWORD     — storepass
      #   ANDROID_KEY_ALIAS             — key alias (e.g. "upload")
      #   ANDROID_KEY_PASSWORD          — keypass
      - name: Write release keystore and key.properties
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/release.keystore
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../release.keystore
          EOF

      - name: Patch build.gradle.kts (compileSdk, desugaring, signing)
        shell: python3 {0}
        run: |
          path = 'android/app/build.gradle.kts'
          with open(path) as f:
              content = f.read()
          # flutter_plugin_android_lifecycle requires compileSdk >= 36
          content = content.replace(
              'compileSdk = flutter.compileSdkVersion',
              'compileSdk = 36',
              1,
          )
          content = content.replace(
              'compileOptions {',
              'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
              1,
          )
          dep = '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if 'dependencies {}' in content:
              content = content.replace('dependencies {}', 'dependencies {\n' + dep + '\n}', 1)
          elif 'dependencies {' in content:
              content = content.replace('dependencies {', 'dependencies {\n' + dep, 1)
          else:
              content = content.rstrip() + '\n\ndependencies {\n' + dep + '\n}\n'
          with open(path, 'w') as f:
              f.write(content)

          # file_picker hardcodes compileSdkVersion=34 in its own build file.
          # AGP 9+ dropped the compileSdkVersion method from the new DSL — it only
          # reads compileSdk. Rename it and ensure the value is >= 36.
          import glob, os, re
          pub_cache = os.environ.get('PUB_CACHE', os.path.expanduser('~/.pub-cache'))
          pattern = os.path.join(
              pub_cache, 'hosted', 'pub.dev',
              'file_picker-*', 'android', 'build.gradle*',
          )
          matched = glob.glob(pattern)
          print(f'file_picker build files found: {matched}')
          for fp in matched:
              with open(fp) as f:
                  txt = f.read()
              updated = re.sub(
                  r'compileSdkVersion\s+(\d+)',
                  lambda m: 'compileSdk ' + str(max(int(m.group(1)), 36)),
                  txt,
              )
              updated = re.sub(
                  r'(compileSdk\s*=\s*)(\d+)',
                  lambda m: m.group(1) + str(max(int(m.group(2)), 36)),
                  updated,
              )
              updated = re.sub(
                  r'(compileSdk\s+)(\d+)',
                  lambda m: m.group(1) + str(max(int(m.group(2)), 36)),
                  updated,
              )
              if updated != txt:
                  with open(fp, 'w') as f:
                      f.write(updated)
                  print(f'Patched: {fp}')
              else:
                  print(f'No upgrade needed in: {fp}')
          if not matched:
              print('WARNING: No file_picker build files found in pub cache')

          # WorkManager uses Room internally and instantiates WorkDatabase_Impl
          # via reflection. R8 strips the no-arg constructor unless we keep it.
          keep_rules = (
              '\n# WorkManager — keep Room-generated impl used via reflection\n'
              '-keep class androidx.work.impl.WorkDatabase_Impl { <init>(); }\n'
              '-keep class * extends androidx.work.Worker {\n'
              '    public <init>(android.content.Context,androidx.work.WorkerParameters);\n'
              '}\n'
              '-keep class * extends androidx.work.ListenableWorker {\n'
              '    public <init>(android.content.Context,androidx.work.WorkerParameters);\n'
              '}\n'
          )
          with open('android/app/proguard-rules.pro', 'a') as f:
              f.write(keep_rules)
          print('Appended WorkManager ProGuard keep rules')

          # Inject release signing config when key.properties exists.
          kp = 'android/key.properties'
          if os.path.exists(kp):
              app_gradle = 'android/app/build.gradle.kts'
              with open(app_gradle) as f:
                  gradle = f.read()
              nl = '\n'
              signing_block = (
                  'import java.util.Properties' + nl +
                  'import java.io.FileInputStream' + nl + nl +
                  'val keystoreProps = Properties().apply {' + nl +
                  '    val f = rootProject.file("key.properties")' + nl +
                  '    if (f.exists()) load(FileInputStream(f))' + nl +
                  '}' + nl + nl
              )
              signing_config = (
                  nl +
                  '    signingConfigs {' + nl +
                  '        create("release") {' + nl +
                  '            keyAlias      = keystoreProps["keyAlias"]      as String' + nl +
                  '            keyPassword   = keystoreProps["keyPassword"]   as String' + nl +
                  '            storeFile     = file(keystoreProps["storeFile"] as String)' + nl +
                  '            storePassword = keystoreProps["storePassword"] as String' + nl +
                  '        }' + nl +
                  '    }' + nl
              )
              gradle = signing_block + gradle
              gradle = gradle.replace('    buildTypes {', signing_config + '    buildTypes {', 1)
              # Flutter templates vary across versions:
              #   older: signingConfig = signingConfigs.getByName("debug")
              #   newer: signingConfig = signingConfigs.debug
              #   some:  no signingConfig line at all in the release block
              replaced = re.sub(
                  r'signingConfig\s*=\s*signingConfigs(?:\.getByName\(["\']debug["\']\)|\.debug\b)',
                  'signingConfig = signingConfigs.getByName("release")',
                  gradle,
                  count=1,
              )
              if replaced != gradle:
                  gradle = replaced
                  print('Replaced debug signingConfig with release in build.gradle.kts')
              else:
                  # No debug signing line found — inject directly into release block
                  gradle = re.sub(
                      r'(release\s*\{)',
                      r'\1\n            signingConfig = signingConfigs.getByName("release")',
                      gradle,
                      count=1,
                  )
                  print('Injected signingConfig into release block (no debug line found)')
              with open(app_gradle, 'w') as f:
                  f.write(gradle)
              print('Patched build.gradle.kts for release signing')

      - name: Build release APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk \
            "StockManager-${VERSION}-android.apk"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stockmanager-android-apk
          path: src/StockManager-*-android.apk
          retention-days: 7

  # ── Linux (.deb) ──────────────────────────────────────────────────────────────
  build-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libsecret-1-dev dpkg-dev

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Linux platform files
        run: flutter create --platforms=linux .

      - name: Build Linux
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build linux --release \
            --build-name="$VERSION" \
            --build-number=${{ github.run_number }}

      - name: Package as .deb
        run: |
          BUNDLE=build/linux/x64/release/bundle
          PKG=/tmp/stock-manager-pkg
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH=amd64

          install -dm755 "$PKG/DEBIAN"
          install -dm755 "$PKG/usr/lib/stock-manager"
          install -dm755 "$PKG/usr/bin"
          install -dm755 "$PKG/usr/share/applications"

          cp -r "$BUNDLE/." "$PKG/usr/lib/stock-manager/"

          printf '#!/bin/sh\nexec /usr/lib/stock-manager/stock_manager "$@"\n' \
            > "$PKG/usr/bin/stock-manager"
          chmod 755 "$PKG/usr/bin/stock-manager"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=StockManager' \
            'Comment=Personal stock portfolio tracker' \
            'Exec=/usr/bin/stock-manager' \
            'Terminal=false' \
            'Type=Application' \
            'Categories=Finance;' \
            > "$PKG/usr/share/applications/stock-manager.desktop"

          INSTALLED_SIZE=$(du -sk "$PKG/usr" | cut -f1)
          printf 'Package: stock-manager\nVersion: %s\nArchitecture: %s\nMaintainer: StockManager contributors\nInstalled-Size: %s\nDepends: libgtk-3-0, libsecret-1-0\nSection: utils\nPriority: optional\nDescription: Personal stock portfolio tracker\n Cross-platform portfolio app for managing stocks across multiple brokers with real-time valuations and Nextcloud sync.\n' \
            "$VERSION" "$ARCH" "$INSTALLED_SIZE" \
            > "$PKG/DEBIAN/control"

          dpkg-deb --root-owner-group --build "$PKG" \
            "StockManager-${VERSION}-linux-amd64.deb"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stockmanager-linux-deb
          path: src/StockManager-*-linux-amd64.deb
          retention-days: 7

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-windows:
    name: Release Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate Windows platform files
        run: flutter create --platforms=windows .

      - name: Build Windows
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          flutter build windows --release `
            --build-name="$VERSION" `
            --build-number=${{ github.run_number }}
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath "StockManager-$VERSION-windows-x64.zip"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stockmanager-windows-zip
          path: src/StockManager-*-windows-x64.zip
          retention-days: 7

  # ── macOS ─────────────────────────────────────────────────────────────────────
  # Note: distributing outside the Mac App Store requires a Developer ID
  # certificate added as secrets (MACOS_CERTIFICATE + MACOS_CERTIFICATE_PWD).
  # Without it the .app is ad-hoc signed (runs on the build machine, not
  # Gatekeeper-verified for end users).
  build-macos:
    name: Release macOS
    runs-on: macos-latest
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate macOS platform files
        run: flutter create --platforms=macos .

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Build macOS
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build macos --release \
            --build-name="$VERSION" \
            --build-number=${{ github.run_number }}

      - name: Re-sign macOS app (ad-hoc, no sandbox)
        working-directory: src/build/macos/Build/Products/Release
        run: |
          cat > /tmp/nosandbox.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.network.client</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --deep --force --sign - \
            --entitlements /tmp/nosandbox.entitlements \
            stock_manager.app

      - name: Package macOS app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent \
            build/macos/Build/Products/Release/stock_manager.app \
            "StockManager-${VERSION}-macos.zip"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stockmanager-macos-zip
          path: src/StockManager-*-macos.zip
          retention-days: 7

  # ── SBOM ──────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./src
          format: cyclonedx-json
          artifact-name: stockmanager-sbom.cdx.json
          output-file: stockmanager-sbom.cdx.json
          upload-release-assets: false

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-linux, build-windows, build-macos, sbom]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          make_latest: true
          generate_release_notes: true
          files: artifacts/*
